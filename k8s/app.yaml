apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-feed-api
  namespace: social-feed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-feed-api
  template:
    metadata:
      labels:
        app: social-feed-api
    spec:
      containers:
        - name: api
          image: social-feed:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: CASSANDRA_CONTACT_POINTS
              value: cassandra-dc1-rack1-0.cassandra.social-feed.svc.cluster.local,cassandra-dc1-rack2-0.cassandra.social-feed.svc.cluster.local,cassandra-dc1-rack3-0.cassandra.social-feed.svc.cluster.local,cassandra-dc2-rack1-0.cassandra.social-feed.svc.cluster.local,cassandra-dc2-rack2-0.cassandra.social-feed.svc.cluster.local,cassandra-dc2-rack3-0.cassandra.social-feed.svc.cluster.local
            - name: CASSANDRA_PORT
              value: "9042"
            - name: CASSANDRA_KEYSPACE
              value: social_feed
            - name: CASSANDRA_CONNECT_RETRIES
              value: "90"
            - name: CASSANDRA_RETRY_DELAY_SECONDS
              value: "2"
            - name: CASSANDRA_TRACE_ENABLED
              value: "false"
            - name: CASSANDRA_TRACE_SAMPLE_RATE
              value: "0.0"
            - name: CASSANDRA_TRACE_LOG_EVENTS
              value: "false"
            - name: CASSANDRA_TRACE_MAX_WAIT_SECONDS
              value: "5"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: social-feed-api
  namespace: social-feed
spec:
  selector:
    app: social-feed-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
