apiVersion: v1
kind: Service
metadata:
  name: cassandra
  namespace: social-feed
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: cassandra
  ports:
    - name: cql
      port: 9042
      targetPort: 9042
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cassandra-startup
  namespace: social-feed
data:
  start-cassandra.sh: |
    #!/bin/bash
    set -euo pipefail
    sed -i "s/^num_tokens:.*/num_tokens: ${CASSANDRA_NUM_TOKENS}/" /etc/cassandra/cassandra.yaml
    if grep -q '^initial_token:' /etc/cassandra/cassandra.yaml; then
      sed -i "s/^initial_token:.*/initial_token: ${CASSANDRA_INITIAL_TOKEN}/" /etc/cassandra/cassandra.yaml
    else
      printf '\ninitial_token: %s\n' "${CASSANDRA_INITIAL_TOKEN}" >> /etc/cassandra/cassandra.yaml
    fi
    exec /usr/local/bin/docker-entrypoint.sh cassandra -f
---
apiVersion: v1
kind: Service
metadata:
  name: cassandra-client
  namespace: social-feed
spec:
  selector:
    app: cassandra
  ports:
    - name: cql
      port: 9042
      targetPort: 9042
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra-dc1-rack1
  namespace: social-feed
spec:
  serviceName: cassandra
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
      cassandra.datacenter: dc1
      cassandra.rack: rack1
  template:
    metadata:
      labels:
        app: cassandra
        cassandra.datacenter: dc1
        cassandra.rack: rack1
    spec:
      terminationGracePeriodSeconds: 180
      nodeSelector:
        cassandra.node: "true"
        cassandra.datacenter: dc1
        cassandra.rack: rack1
      containers:
        - name: cassandra
          image: cassandra:5.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - /opt/cassandra/bin/start-cassandra.sh
          ports:
            - containerPort: 7000
              name: intra-node
            - containerPort: 9042
              name: cql
            - containerPort: 7199
              name: jmx
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: social-feed
            - name: CASSANDRA_SEEDS
              value: cassandra-dc1-rack1-0.cassandra.social-feed.svc.cluster.local,cassandra-dc2-rack1-0.cassandra.social-feed.svc.cluster.local
            - name: CASSANDRA_DC
              value: dc1
            - name: CASSANDRA_RACK
              value: rack1
            - name: CASSANDRA_ENDPOINT_SNITCH
              value: GossipingPropertyFileSnitch
            - name: CASSANDRA_INITIAL_TOKEN
              value: "-6148914691236517206"
            - name: CASSANDRA_NUM_TOKENS
              value: "1"
            - name: CASSANDRA_RPC_ADDRESS
              value: 0.0.0.0
            - name: CASSANDRA_LISTEN_ADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CASSANDRA_BROADCAST_ADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CASSANDRA_BROADCAST_RPC_ADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: MAX_HEAP_SIZE
              value: 384M
            - name: HEAP_NEWSIZE
              value: 96M
          volumeMounts:
            - name: data
              mountPath: /var/lib/cassandra
            - name: startup
              mountPath: /opt/cassandra/bin/start-cassandra.sh
              subPath: start-cassandra.sh
          startupProbe:
            tcpSocket:
              port: 9042
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - cqlsh 127.0.0.1 9042 -e "DESCRIBE KEYSPACES"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9042
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              memory: 768Mi
      volumes:
        - name: startup
          configMap:
            name: cassandra-startup
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
---
