apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: social-feed-api
  namespace: social-feed
spec:
  ingressClassName: nginx
  rules:
    - host: social-feed.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: social-feed-api
                port:
                  number: 80
